name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web --release

      - name: Verify output files
        run: |
          test -f pkg/scolta_core_bg.wasm
          test -f pkg/scolta_core.js
          test -f pkg/scolta_core.d.ts

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf scolta-core-${VERSION}.tar.gz \
            -C pkg \
            scolta_core_bg.wasm \
            scolta_core.js \
            scolta_core.d.ts \
            scolta_core_bg.wasm.d.ts
          echo "ARCHIVE=scolta-core-${VERSION}.tar.gz" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Extract CHANGELOG entry
        run: |
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release-notes.txt
          cat release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
