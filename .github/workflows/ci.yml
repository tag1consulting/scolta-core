name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib

  build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build --target web --release
      - name: Verify output files
        run: |
          test -f pkg/scolta_core_bg.wasm
          test -f pkg/scolta_core.js
          test -f pkg/scolta_core.d.ts
      - name: Check binary size
        run: |
          SIZE=$(wc -c < pkg/scolta_core_bg.wasm)
          echo "WASM size: $SIZE bytes"
          if [ "$SIZE" -gt 512000 ]; then
            echo "::warning::WASM binary exceeds 500KB ($SIZE bytes)"
          fi

  changelog:
    name: CHANGELOG enforcement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG updated
        run: |
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/' 'Cargo.toml' 'tests/' | head -1)
          if [ -n "$CODE_CHANGED" ]; then
            CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md)
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "FAIL: Code changed but CHANGELOG.md was not updated."
              exit 1
            fi
          fi

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version format
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Version: $VERSION"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$' || \
            (echo "FAIL: Invalid version format: $VERSION" && exit 1)
          echo "PASS"
